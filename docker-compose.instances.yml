# Multi-instance OpenClaw deployment.
#
# Each instance gets its own config/data directory under ~/.openclaw-instances/NNNN/.
# Instance IDs are zero-padded (0001, 0002, ..., 9999).
#
# Usage:
#   pnpm gateway:docker:deploy          # build + start all instances
#   pnpm gateway:docker:deploy -- 0001  # deploy single instance
#
# Instance config:
#   ~/.openclaw-instances/0001/openclaw.json   — gateway config, Discord token, etc.
#   ~/.openclaw-instances/0001/agents/         — agent memory, sessions, auth profiles
#   ~/.openclaw-instances/0001/workspace/      — working directory
#
# First-time setup per instance:
#   1. Create the instance directory
#   2. Run onboarding: docker compose ... run --rm openclaw-NNNN onboard
#   3. Start: docker compose ... up -d openclaw-NNNN

x-openclaw-base: &openclaw-base
  image: ${OPENCLAW_IMAGE:-openclaw:local}
  init: true
  restart: unless-stopped
  environment: &openclaw-env
    HOME: /home/node
    TERM: xterm-256color
    NODE_ENV: production
    # GPU disabled by default in containers (no CUDA support)
    OPENCLAW_LLAMA_GPU: "off"

services:
  openclaw-0001:
    <<: *openclaw-base
    container_name: openclaw-0001
    environment:
      <<: *openclaw-env
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_0001_TOKEN:-}
    volumes:
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/0001:/home/node/.openclaw
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/0001/workspace:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_0001_PORT:-18789}:18789"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
        "--force",
      ]

  openclaw-0002:
    <<: *openclaw-base
    container_name: openclaw-0002
    environment:
      <<: *openclaw-env
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_0002_TOKEN:-}
    volumes:
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/0002:/home/node/.openclaw
      - ${OPENCLAW_INSTANCES_DIR:-~/.openclaw-instances}/0002/workspace:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_0002_PORT:-18791}:18789"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
        "--force",
      ]
