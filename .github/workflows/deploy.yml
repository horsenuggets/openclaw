name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: CI run ID to download artifacts from
        required: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Validate DEPLOY_PLATFORM
        env:
          DEPLOY_PLATFORM: ${{ vars.DEPLOY_PLATFORM }}
        run: |
          if [ -z "$DEPLOY_PLATFORM" ]; then
            echo "::error::DEPLOY_PLATFORM repository variable is not set. Set it to the target platform, e.g. linux-x64"
            exit 1
          fi
          echo "Deploy target: $DEPLOY_PLATFORM"

      - name: Checkout (deploy scripts and docker files)
        uses: actions/checkout@v4

      - name: Download compiled artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_PLATFORM: ${{ vars.DEPLOY_PLATFORM }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id || inputs.run_id }}"
          echo "Downloading binaries-$DEPLOY_PLATFORM from CI run $RUN_ID"
          mkdir -p artifacts/
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --name "binaries-$DEPLOY_PLATFORM" --dir artifacts/
          ls -la artifacts/

      - name: Assemble deployment tarball
        env:
          DEPLOY_PLATFORM: ${{ vars.DEPLOY_PLATFORM }}
        run: |
          TARGET="$DEPLOY_PLATFORM"
          STAGING="/tmp/openclaw-deployment-staging"
          mkdir -p "$STAGING/deploy/bin" "$STAGING/deploy/docker" "$STAGING/deploy/extensions" "$STAGING/deploy/docs/reference"

          # Binaries (from CI artifacts — never built in CD)
          cp "artifacts/openclaw-$TARGET" "$STAGING/deploy/bin/openclaw"
          cp "artifacts/discord-router-$TARGET" "$STAGING/deploy/bin/discord-router"
          cp "artifacts/health-monitor-$TARGET" "$STAGING/deploy/bin/health-monitor"
          cp infrastructure/scripts/openclawctl "$STAGING/deploy/bin/openclawctl"
          chmod +x "$STAGING/deploy/bin/"*

          # Docker compose files
          cp infrastructure/docker/discord-router.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/agent.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/whisper.yml "$STAGING/deploy/docker/"

          # Workspace templates (static repo files, not build artifacts)
          if [ -d docs/reference/templates ]; then
            mkdir -p "$STAGING/deploy/docs/reference"
            cp -r docs/reference/templates "$STAGING/deploy/docs/reference/"
          fi

          # Deploy scripts
          cp infrastructure/deploy/setup.sh "$STAGING/"
          cp infrastructure/deploy/boot.sh "$STAGING/"
          chmod +x "$STAGING/setup.sh" "$STAGING/boot.sh"

          tar czf /tmp/openclaw-deployment.tar.gz -C "$STAGING" .
          rm -rf "$STAGING"
          echo "Tarball size: $(du -h /tmp/openclaw-deployment.tar.gz | cut -f1)"

      - name: Deploy to host
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pin the gateway host key to prevent MITM
          echo "[${DEPLOY_HOST}]:10022 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF+I2Iw5QbneeTpiRiQPWOsKB+LgzV7felLqhtXOanO2" >> ~/.ssh/known_hosts

          REMOTE_SSH="ssh -o ConnectTimeout=30 -i ~/.ssh/deploy_key -p 10022 openclaw@${DEPLOY_HOST}"

          # Upload tarball to the gateway host
          scp -o ConnectTimeout=30 -i ~/.ssh/deploy_key -P 10022 \
            /tmp/openclaw-deployment.tar.gz "openclaw@${DEPLOY_HOST}:/tmp/openclaw-deployment.tar.gz"

          # Extract and run setup on the gateway host
          $REMOTE_SSH "rm -rf /tmp/openclaw-deployment && mkdir -p /tmp/openclaw-deployment && cd /tmp/openclaw-deployment && tar xzf /tmp/openclaw-deployment.tar.gz && bash setup.sh && rm -rf /tmp/openclaw-deployment /tmp/openclaw-deployment.tar.gz"

          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "[${DEPLOY_HOST}]:10022 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF+I2Iw5QbneeTpiRiQPWOsKB+LgzV7felLqhtXOanO2" >> ~/.ssh/known_hosts

          sleep 15
          ssh -o ConnectTimeout=30 -i ~/.ssh/deploy_key -p 10022 "openclaw@${DEPLOY_HOST}" "docker ps -a"



          rm -f ~/.ssh/deploy_key
