name: Deploy

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Compile binary
        run: node scripts/compile.mjs --target linux-x64 --skip-build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Assemble deployment tarball
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
        run: |
          STAGING="/tmp/openclaw-deployment-staging"
          mkdir -p "$STAGING/deploy/bin" "$STAGING/deploy/docker" "$STAGING/deploy/extensions"

          # Binary
          cp dist/openclaw-linux-x64 "$STAGING/deploy/bin/openclaw"
          chmod +x "$STAGING/deploy/bin/openclaw"

          # Extensions
          cp -r dist/extensions/* "$STAGING/deploy/extensions/"

          # Docker compose files
          cp infrastructure/docker/gateway.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/whisper.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/user.yml "$STAGING/deploy/docker/"

          # Deploy scripts
          cp infrastructure/deploy/setup.sh "$STAGING/"
          cp infrastructure/deploy/boot.sh "$STAGING/"
          chmod +x "$STAGING/setup.sh" "$STAGING/boot.sh"

          # .env from GitHub Secrets
          cat > "$STAGING/.env" << EOF
          DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
          EOF

          tar czf /tmp/openclaw-deployment.tar.gz -C "$STAGING" .
          rm -rf "$STAGING"
          echo "Tarball size: $(du -h /tmp/openclaw-deployment.tar.gz | cut -f1)"

      - name: Deploy to host
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SCP_CMD="scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P ${DEPLOY_PORT}"
          SSH_CMD="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} ${DEPLOY_USER}@${DEPLOY_HOST}"

          $SCP_CMD /tmp/openclaw-deployment.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"

          $SSH_CMD "
            rm -rf /tmp/openclaw-deployment
            mkdir /tmp/openclaw-deployment
            cd /tmp/openclaw-deployment
            tar xzf /tmp/openclaw-deployment.tar.gz
            bash setup.sh
            rm -rf /tmp/openclaw-deployment /tmp/openclaw-deployment.tar.gz
          "

          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_CMD="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} ${DEPLOY_USER}@${DEPLOY_HOST}"

          sleep 10
          $SSH_CMD 'docker ps -a --filter "name=openclaw-" --format "table {{.Names}}\t{{.Status}}"'

          rm -f ~/.ssh/deploy_key
