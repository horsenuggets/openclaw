name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: CI run ID to download artifacts from
        required: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Validate COMPILE_TARGETS
        run: |
          if [ -z '${{ vars.COMPILE_TARGETS }}' ]; then
            echo "::error::COMPILE_TARGETS repository variable is not set. Configure it as a JSON array, e.g. [\"linux-x64\"]"
            exit 1
          fi

      - name: Parse deploy target
        id: target
        run: |
          TARGET=$(echo '${{ vars.COMPILE_TARGETS }}' | jq -r '.[0]')
          if [ -z "$TARGET" ] || [ "$TARGET" = "null" ]; then
            echo "::error::COMPILE_TARGETS must be a non-empty JSON array"
            exit 1
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Deploy target: $TARGET"

      - name: Checkout (deploy scripts and docker files)
        uses: actions/checkout@v4

      - name: Download compiled artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          RUN_ID="${{ github.event.workflow_run.id || inputs.run_id }}"
          echo "Downloading binaries-$TARGET from CI run $RUN_ID"
          mkdir -p artifacts/
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --name "binaries-$TARGET" --dir artifacts/
          ls -la artifacts/

      - name: Assemble deployment tarball
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          STAGING="/tmp/openclaw-deployment-staging"
          mkdir -p "$STAGING/deploy/bin" "$STAGING/deploy/docker" "$STAGING/deploy/extensions" "$STAGING/deploy/docs/reference"

          # Binaries (from CI artifacts — never built in CD)
          cp "artifacts/openclaw-$TARGET" "$STAGING/deploy/bin/openclaw"
          cp "artifacts/discord-router-$TARGET" "$STAGING/deploy/bin/discord-router"
          cp "artifacts/health-monitor-$TARGET" "$STAGING/deploy/bin/health-monitor"
          cp infrastructure/scripts/openclawctl "$STAGING/deploy/bin/openclawctl"
          chmod +x "$STAGING/deploy/bin/"*

          # Docker compose files
          cp infrastructure/docker/discord-router.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/agent.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/whisper.yml "$STAGING/deploy/docker/"

          # Workspace templates (static repo files, not build artifacts)
          if [ -d docs/reference/templates ]; then
            mkdir -p "$STAGING/deploy/docs/reference"
            cp -r docs/reference/templates "$STAGING/deploy/docs/reference/"
          fi

          # Deploy scripts
          cp infrastructure/deploy/setup.sh "$STAGING/"
          cp infrastructure/deploy/boot.sh "$STAGING/"
          chmod +x "$STAGING/setup.sh" "$STAGING/boot.sh"

          tar czf /tmp/openclaw-deployment.tar.gz -C "$STAGING" .
          rm -rf "$STAGING"
          echo "Tarball size: $(du -h /tmp/openclaw-deployment.tar.gz | cut -f1)"

      - name: Deploy to host
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key"
          WIN_SSH="ssh $SSH_OPTS -p ${DEPLOY_PORT} ${DEPLOY_USER}@${DEPLOY_HOST}"

          # Ensure C:\tmp exists on Windows
          $WIN_SSH "powershell.exe -NoProfile -Command \"New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null\""

          # Upload tarball to Windows host
          scp $SSH_OPTS -P ${DEPLOY_PORT} /tmp/openclaw-deployment.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:C:/tmp/openclaw-deployment.tar.gz"

          # Copy into WSL and run setup
          $WIN_SSH "wsl -d OpenClaw -u openclaw -e bash -lc 'cp /mnt/c/tmp/openclaw-deployment.tar.gz /tmp/ && rm -rf /tmp/openclaw-deployment && mkdir -p /tmp/openclaw-deployment && cd /tmp/openclaw-deployment && tar xzf /tmp/openclaw-deployment.tar.gz && bash setup.sh && rm -rf /tmp/openclaw-deployment /tmp/openclaw-deployment.tar.gz'"

          # Cleanup Windows temp
          $WIN_SSH "powershell.exe -NoProfile -Command \"Remove-Item -Force C:\tmp\openclaw-deployment.tar.gz -ErrorAction SilentlyContinue\""
          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key"
          WIN_SSH="ssh $SSH_OPTS -p ${DEPLOY_PORT} ${DEPLOY_USER}@${DEPLOY_HOST}"

          sleep 15
          $WIN_SSH "wsl -d OpenClaw -u openclaw -e docker ps -a"

          rm -f ~/.ssh/deploy_key
