name: Deploy

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to gateway host
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      - name: Deploy via SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_CMD="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22} ${DEPLOY_USER}@${DEPLOY_HOST}"

          $SSH_CMD bash -c "
            set -euo pipefail
            echo '=== Deploying OpenClaw $VERSION ==='

            cd ~/git/openclaw

            # Pull latest from release branch
            git fetch origin release
            git checkout release
            git reset --hard origin/release
            echo 'Pulled release branch.'

            # Build the router (bare-metal Node.js)
            npm run build
            echo 'Router built.'

            # Rebuild Docker image
            docker build -t openclaw:local .
            echo 'Docker image built.'

            # Regenerate compose and recreate containers
            bash scripts/instance-compose.sh
            docker compose -f docker-compose.generated.yml up -d --force-recreate
            echo 'Containers recreated.'

            # Restart the Discord router
            pm2 restart openclaw-router
            echo 'Router restarted.'

            # Wait for containers to be healthy
            sleep 15
            docker ps --format 'table {{.Names}}\t{{.Status}}'

            echo '=== Deploy complete: $VERSION ==='
          "

          rm -f ~/.ssh/deploy_key

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest
