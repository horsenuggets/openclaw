name: Deploy

on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout submodules (retry)
        run: |
          set -euo pipefail
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          for attempt in 1 2 3 4 5; do
            if git -c protocol.version=2 submodule update --init --force --depth=1 --recursive; then
              exit 0
            fi
            echo "Submodule update failed (attempt $attempt/5). Retrying…"
            sleep $((attempt * 10))
          done
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Compile binaries
        run: node scripts/compile.mjs --target linux-x64 --skip-build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Assemble deployment tarball
        run: |
          STAGING="/tmp/openclaw-deployment-staging"
          mkdir -p "$STAGING/deploy/bin" "$STAGING/deploy/docker" "$STAGING/deploy/extensions" "$STAGING/deploy/docs/reference"

          # Binaries
          cp dist/openclaw-linux-x64 "$STAGING/deploy/bin/openclaw"
          cp dist/discord-router-linux-x64 "$STAGING/deploy/bin/discord-router"
          cp infrastructure/scripts/openclawctl "$STAGING/deploy/bin/openclawctl"
          chmod +x "$STAGING/deploy/bin/"*

          # Extensions (fallback for non-embedded plugins)
          if [ -d dist/extensions ]; then
            cp -r dist/extensions/* "$STAGING/deploy/extensions/" 2>/dev/null || true
          fi

          # Docker compose files
          cp infrastructure/docker/discord-router.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/agent.yml "$STAGING/deploy/docker/"
          cp infrastructure/docker/whisper.yml "$STAGING/deploy/docker/"

          # Workspace templates
          if [ -d dist/docs/reference/templates ]; then
            cp -r dist/docs/reference/templates "$STAGING/deploy/docs/reference/"
          fi

          # Deploy scripts
          cp infrastructure/deploy/setup.sh "$STAGING/"
          cp infrastructure/deploy/boot.sh "$STAGING/"
          chmod +x "$STAGING/setup.sh" "$STAGING/boot.sh"

          tar czf /tmp/openclaw-deployment.tar.gz -C "$STAGING" .
          rm -rf "$STAGING"
          echo "Tarball size: $(du -h /tmp/openclaw-deployment.tar.gz | cut -f1)"

      - name: Deploy to host
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key"
          WIN_SSH="ssh $SSH_OPTS -p ${DEPLOY_PORT} ${DEPLOY_USER}@${DEPLOY_HOST}"

          # Ensure C:\tmp exists on Windows (explicitly use powershell)
          $WIN_SSH "powershell.exe -NoProfile -Command \"New-Item -ItemType Directory -Force -Path C:\tmp | Out-Null\""

          # Upload tarball to Windows host
          scp $SSH_OPTS -P ${DEPLOY_PORT} /tmp/openclaw-deployment.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:C:/tmp/openclaw-deployment.tar.gz"

          # Copy into WSL and run setup
          $WIN_SSH "wsl -d OpenClaw -u openclaw -e bash -lc 'cp /mnt/c/tmp/openclaw-deployment.tar.gz /tmp/ && rm -rf /tmp/openclaw-deployment && mkdir -p /tmp/openclaw-deployment && cd /tmp/openclaw-deployment && tar xzf /tmp/openclaw-deployment.tar.gz && bash setup.sh && rm -rf /tmp/openclaw-deployment /tmp/openclaw-deployment.tar.gz'"

          # Cleanup Windows temp
          $WIN_SSH "powershell.exe -NoProfile -Command \"Remove-Item -Force C:\tmp\openclaw-deployment.tar.gz -ErrorAction SilentlyContinue\""
          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key"
          WIN_SSH="ssh $SSH_OPTS -p ${DEPLOY_PORT} ${DEPLOY_USER}@${DEPLOY_HOST}"

          sleep 15
          $WIN_SSH "wsl -d OpenClaw -u openclaw -e docker ps -a"

          rm -f ~/.ssh/deploy_key
