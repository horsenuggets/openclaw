<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw - Authorization</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0b0b11;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
    .card{background:#1a1a2e;border-radius:12px;padding:2rem;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.4)}
    h1{font-size:1.4rem;margin-bottom:.5rem}
    .sub{color:#888;margin-bottom:1.5rem;font-size:.9rem}
    .ok{color:#43b581;font-size:1.1rem;margin:1rem 0}
    .err{color:#f04747;font-size:1rem;margin:1rem 0}
    .logo{font-size:2rem;margin-bottom:.5rem}
    .hint{color:#666;font-size:.8rem;margin-top:1rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#129438;</div>
    <h1 id="title">Redirecting...</h1>
    <p class="sub" id="sub">Sending authorization to your bot</p>
    <div id="result"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('sub');
    const resultEl = document.getElementById('result');

    if (error) {
      titleEl.textContent = 'Authorization Failed';
      subEl.textContent = error;
      resultEl.innerHTML = '<div class="err">Google denied the request. Try again.</div>';
    } else if (!code) {
      titleEl.textContent = 'No Code Received';
      subEl.textContent = 'Something went wrong with the authorization.';
    } else {
      // Redirect to the callback server via form POST (bypasses mixed content)
      // The state contains the host and port of the callback server
      let relayUrl;
      try {
        const padded = state + '='.repeat((4 - state.length % 4) % 4);
        const stateData = JSON.parse(atob(padded.replace(/-/g,'+').replace(/_/g,'/')));
        relayUrl = `http://${stateData.host}:${stateData.port}/auth/receive`;
      } catch {
        relayUrl = null;
      }

      if (relayUrl) {
        // Use a hidden form POST — form submissions are NOT blocked by mixed content
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = relayUrl;
        form.style.display = 'none';

        const addField = (name, value) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = name;
          input.value = value;
          form.appendChild(input);
        };

        addField('code', code);
        addField('state', state);
        addField('redirect_url', location.href);

        document.body.appendChild(form);
        form.submit();
      } else {
        titleEl.textContent = 'Authorization Complete';
        subEl.textContent = 'Could not auto-relay. Copy the URL from your address bar and paste it in your Discord DM with OpenClaw.';
      }
    }
  </script>
</body>
</html>
