<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Lexend',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#000;color:#fff}
    .wrap{text-align:center;max-width:420px;padding:2rem}
    p{font-size:1rem;font-weight:400;color:#aaa}
  </style>
</head>
<body>
  <div class="wrap">
    <p id="msg">Connecting...</p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const msg = document.getElementById('msg');

    if (error) {
      msg.textContent = 'Authorization failed: ' + error;
      msg.style.color = '#f04747';
    } else if (!code) {
      msg.textContent = 'No authorization code received.';
      msg.style.color = '#f04747';
    } else {
      let relayUrl;
      try {
        const padded = state + '='.repeat((4 - state.length % 4) % 4);
        const stateData = JSON.parse(atob(padded.replace(/-/g,'+').replace(/_/g,'/')));
        relayUrl = 'http://' + stateData.host + ':' + stateData.port + '/auth/receive';
      } catch {
        relayUrl = null;
      }

      if (relayUrl) {
        window.location.href = relayUrl
          + '?code=' + encodeURIComponent(code)
          + '&state=' + encodeURIComponent(state);
      } else {
        msg.textContent = 'Authorization complete. Could not relay automatically.';
      }
    }
  </script>
</body>
</html>
